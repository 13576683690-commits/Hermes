name: Daily Auto Archive
on:
  schedule:
    - cron: '0 16 * * *' # 对应北京时间 0 点（UTC 16点）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  archive-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Archive and Update Dashboard
        run: python3 scripts/auto_archive.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Hermes-Auto-Archiver"
          git config --global user.email "auto-archiver@hermes.com"
          git add index.html
          git commit -m "chore: daily auto archive update [skip ci]" || echo "No changes to commit"
          git push origin main
