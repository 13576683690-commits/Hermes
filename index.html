<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>进化档案馆</title>
<style>
* { box-sizing: border-box; }
body { background: #0a0a0a; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; }
.container { max-width: 1100px; margin: 0 auto; }
.header { text-align: center; padding: 40px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 30px; }
.avatar { width: 96px; height: 96px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(0,0,0,0.5); object-fit: cover; margin-bottom: 20px; }
h1 { font-size: 36px; font-weight: 700; color: #fff; margin: 12px 0 8px 0; }
.subtitle { color: #94a3b8; font-size: 16px; margin: 8px 0; }
.status { display: inline-block; padding: 6px 14px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; border-radius: 999px; font-size: 12px; margin-top: 16px; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 30px 0; }
.stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 24px; text-align: center; }
.stat-num { font-size: 32px; font-weight: 700; color: #fff; }
.stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-top: 8px; }
.tabs { display: flex; gap: 8px; margin: 30px 0 20px 0; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0; }
.tab { padding: 10px 20px; cursor: pointer; color: #94a3b8; font-size: 14px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #5eead4; border-bottom-color: #5eead4; }
.archive-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
@media (max-width: 768px) { .archive-grid, .stats { grid-template-columns: 1fr; } }
.archive-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; transition: all 0.2s; cursor: pointer; }
.archive-card:hover { border-color: rgba(94, 234, 212, 0.3); background: rgba(255,255,255,0.05); }
.archive-date { color: #5eead4; font-size: 12px; font-family: monospace; }
.archive-title { color: #fff; font-size: 18px; font-weight: 600; margin: 8px 0; }
.archive-desc { color: #94a3b8; font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
.tag-list { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 12px 0; }
.tag { padding: 3px 10px; background: rgba(94, 234, 212, 0.1); border: 1px solid rgba(94, 234, 212, 0.2); color: #5eead4; border-radius: 999px; font-size: 11px; }
.detail-section { margin-top: 16px; padding-top: 16px; border-top: 1px dashed rgba(255,255,255,0.08); }
.detail-row { display: flex; gap: 12px; margin-bottom: 10px; font-size: 13px; }
.detail-icon { flex-shrink: 0; }
.detail-label { color: #94a3b8; min-width: 70px; }
.detail-content { color: #e5e7eb; }
</style>
</head>

    <h1>进化档案馆</h1>
    <p class="subtitle">Hermes 和 锅仔 的共同进化史</p>
    <div class="status">● SYSTEM ACTIVE</div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('archives')">Archives</div>
    <div class="tab" onclick="switchTab('memory')">Memory</div>
    <div class="tab" onclick="switchTab('evolution')">Evolution</div>
  </div>
  <div id="content"></div>
</div>
<script>
let currentTab = 'archives';
let data = null;

fetch('data.json')
  .then(r => r.json())
  .then(d => {
    data = d;
    renderStats();
    renderContent();
  });

function renderStats() {
  const stats = data.stats || {};
  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + (stats.archives || 0) + '</div><div class="stat-label">档案总数</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (stats.points || 0) + '</div><div class="stat-label">累计进化点</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + (stats.skills || 0) + '</div><div class="stat-label">共建 Skills</div></div>';
}

function renderContent() {
  if (currentTab === 'archives') {
    const html = (data.archives || []).map(a => {
      const tags = (a.tags || []).map(t => '<span class="tag">' + t + '</span>').join('');
      const details = a.details || {};
      const renderDetail = (key) => {
        if (!details[key] || !Array.isArray(details[key])) return '';
        return details[key].map(d =>
          '<div class="detail-row"><div class="detail-icon">' + (d.icon || '') + '</div><div class="detail-label">' + key.toUpperCase() + '</div><div class="detail-content"><strong>' + (d.title || '') + '</strong><br/>' + (d.content || '') + '</div></div>'
        ).join('');
      };
      return '<div class="archive-card">' +
        '<div class="archive-date">' + a.date + '</div>' +
        '<h3 class="archive-title">' + (a.title || '') + '</h3>' +
        '<p class="archive-desc">' + (a.desc || '') + '</p>' +
        '<div class="tag-list">' + tags + '</div>' +
        '<div class="detail-section">' + renderDetail('skill') + renderDetail('memory') + renderDetail('evolution') + renderDetail('node') + '</div>' +
        '</div>';
    }).join('');
    document.getElementById('content').innerHTML = '<div class="archive-grid">' + html + '</div>';
  } else if (currentTab === 'memory') {
    const html = (data.memories || []).map(m => '<div class="archive-card"><p class="archive-desc">🧠 ' + (m.content || '') + '</p></div>').join('');
    document.getElementById('content').innerHTML = html;
  } else if (currentTab === 'evolution') {
    const html = (data.evolutions || []).map(e => '<div class="archive-card"><p class="archive-desc">📈 ' + (e.content || '') + '</p></div>').join('');
    document.getElementById('content').innerHTML = html;
  }
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  renderContent();
}
</script>
</body>
</html>
